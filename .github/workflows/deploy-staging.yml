# ============================================================
# 部署到 AI GO Custom App (VFS 注入)
#
# 合進 master 分支自動觸發，部署 ordering + admin 兩個 Custom App。
# 也可在 GitHub Actions 頁面手動觸發。
#
# 必要 Secrets:
#   AIGO_EMAIL        - AI GO 登入 email (admin@sc1984.com)
#   AIGO_PASSWORD     - AI GO 登入密碼
#   ADMIN_APP_ID      - Admin App UUID (從 AI GO Builder 後台取得)
#   ORDERING_APP_ID   - Ordering App UUID (從 AI GO Builder 後台取得)
# ============================================================

name: 部署到 AI GO

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.agent/**'

concurrency:
  group: aigo-deploy
  cancel-in-progress: false

jobs:
  deploy-admin:
    name: 部署 Admin App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝依賴
        run: pip install httpx

      - name: 部署 Admin VFS
        run: python scripts/deploy_admin.py
        env:
          AIGO_EMAIL: ${{ secrets.AIGO_EMAIL }}
          AIGO_PASSWORD: ${{ secrets.AIGO_PASSWORD }}
          ADMIN_APP_ID: ${{ secrets.ADMIN_APP_ID }}

  deploy-ordering:
    name: 部署 Ordering App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝依賴
        run: pip install httpx

      - name: 部署 Ordering VFS
        run: python scripts/deploy_ordering.py
        env:
          AIGO_EMAIL: ${{ secrets.AIGO_EMAIL }}
          AIGO_PASSWORD: ${{ secrets.AIGO_PASSWORD }}
          ORDERING_APP_ID: ${{ secrets.ORDERING_APP_ID }}
